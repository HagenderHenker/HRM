
<h1>Gemeinden</h1>

<table>
    <tr>
        <th>Name</th>
        <th>Aktionen</th>
    </tr>
    {% for gemeinde in gemeinden %}
    <tr>
        <td>{{ gemeinde.name }}</td>
        <td>
            <a href="{% url 'gemeinde_edit' gemeinde.id %}">Bearbeiten</a>
            <a href="{% url 'gemeinde_delete' gemeinde.id %}">Löschen</a>
        </td>
    </tr>
    {% endfor %}   
</table>
